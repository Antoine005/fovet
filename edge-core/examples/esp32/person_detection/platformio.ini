; Ardent SDK — Pulse
; person_detection — Visual Wake Words via TFLite Micro + Z-Score → Watch
;
; Modèle : person_detect (MobileNetV1 0.25×, Visual Wake Words 96×96 grayscale)
; Source  : tanakamasayuki/TensorFlowLite_ESP32 (modèle bundlé dans la librairie)
; Hardware : ESP32-CAM AI-Thinker, board=esp32dev, CH340 COM4
;
; Prérequis (une seule fois après pio run --target install-deps) :
;   1. Copier src/config.h.example → src/config.h et remplir les credentials
;   2. Copier le modèle depuis la librairie installée :
;        cp .pio/libdeps/person_detection/TensorFlowLite_ESP32/examples/person_detection/person_detect_model_data.cpp src/model_data.cpp
;   3. pio run -e person_detection --target upload
;   4. pio device monitor -e person_detection   (ouvrir AVANT RST)
;
; board=esp32dev (JAMAIS esp32cam — crash PSRAM silencieux avec CH340, voir CLAUDE.md)
;
; Résultats CSV (UART 115200) :
;   frame_id, person_score, no_person_score, z_score, anomaly
;
; MQTT topic : ardent/devices/<DEVICE_ID>/readings
; Payload JSON : { value, mean, stddev, zScore, anomaly, ts, sensorType:"VIS", level }

[env:person_detection]
platform  = espressif32
board     = esp32dev
framework = arduino

build_flags =
    -std=c++17
    -DARD_PLATFORM_ESP32
    -DCORE_DEBUG_LEVEL=0
    -DNDEBUG
    -O2

monitor_speed = 115200
upload_speed  = 460800
upload_port   = COM4
monitor_port  = COM4
monitor_rts   = 0
monitor_dtr   = 0

board_build.partitions = huge_app.csv

lib_extra_dirs =
    ${PROJECT_DIR}/../../../../

lib_deps =
    ardent-pulse
    https://github.com/espressif/esp32-camera
    knolleary/PubSubClient @ ^2.8
    tanakamasayuki/TensorFlowLite_ESP32 @ ^1.0.0
