; Fovet SDK — Sentinelle
; person_detection — Visual Wake Words via TFLite Micro + OV2640 + Z-Score → Vigie
;
; Modèle : person_detect (MobileNetV1 0.25×, Visual Wake Words 96×96 grayscale)
; Source  : https://github.com/tensorflow/tflite-micro-arduino-examples
;
; Prérequis (ordre obligatoire) :
;   1. Copier src/config.h.example → src/config.h et remplir WiFi/MQTT credentials
;   2. Générer le modèle C array :
;        python scripts/get_person_model.py
;      → écrit src/model_data.cpp (~300 KB, gitignored)
;   3. pio run -e person_detection --target upload
;   4. pio device monitor -e person_detection   (ouvrir AVANT RST)
;
; board=esp32dev (JAMAIS esp32cam — crash PSRAM silencieux avec CH340, voir CLAUDE.md)
;
; Mémoire sur ESP32-CAM (board=esp32dev, DRAM 320 KB) :
;   Arena TFLite  : 100 KB  (tensor_arena static global)
;   Frame buffer  : ~9 KB   (96×96 grayscale DRAM)
;   WiFi/MQTT     : ~50 KB  (stack FreeRTOS inclus)
;   Code + statics: ~15 KB
;   Marge         : ~146 KB ✓
;
; Résultats CSV (UART 115200) :
;   frame_id, person_score, no_person_score, z_score, anomaly
;
; MQTT topic : fovet/devices/<DEVICE_ID>/readings
; Payload JSON : { value, mean, stddev, zScore, anomaly, ts, sensorType:"VIS", level }

[env:person_detection]
platform  = espressif32
board     = esp32dev
framework = arduino

build_flags =
    -std=c++17
    -DFOVET_PLATFORM_ESP32
    -DCORE_DEBUG_LEVEL=0
    ; Désactive les warnings internes TFLite Micro (très verbeux sans -DNDEBUG)
    -DNDEBUG
    ; Nécessaire pour TFLite Micro : désactive certaines optimisations agressives
    ; qui cassent la précision des ops quantisées sur Xtensa LX6
    -O2

monitor_speed = 115200
upload_speed  = 460800
upload_port   = COM4
monitor_port  = COM4
monitor_rts   = 0
monitor_dtr   = 0

lib_extra_dirs =
    ${PROJECT_DIR}/../../../../

lib_deps =
    fovet-sentinelle
    https://github.com/espressif/esp32-camera
    knolleary/PubSubClient@^2.8
    ; TFLite Micro Arduino — bibliothèque officielle Google
    ; Si l'import échoue, tester : arduino-libraries/Arduino_TensorFlowLite@^2.4.0
    https://github.com/tensorflow/tflite-micro-arduino-examples.git
