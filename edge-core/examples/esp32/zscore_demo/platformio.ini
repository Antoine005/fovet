; Fovet SDK — Sentinelle
; Z-Score Demo — ESP32-CAM (Espressif AI-Thinker)
;
; Requirements:
;   - PlatformIO Core >= 6.x
;   - ESP32-CAM with integrated CH340 USB (COM3) or FTDI adapter
;   - Copy config.h.example to src/config.h and fill in your WiFi/MQTT credentials
;   - 115200 baud monitor
;
; Flash: pio run --target upload
; Monitor: pio device monitor

[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino

build_flags =
    -std=c++17
    -DFOVET_PLATFORM_ESP32
    -DCORE_DEBUG_LEVEL=0

monitor_speed = 115200
upload_speed  = 115200 
upload_port   = COM4
monitor_port  = COM4

lib_extra_dirs =
    ${PROJECT_DIR}/../../../../

lib_deps =
    fovet-sentinelle
    knolleary/PubSubClient@^2.8

; Optional: uncomment to enable unit-tests on native host
; [env:native]
; platform = native
; build_flags =
;     -std=c99
;     -I../../include
;     -DFOVET_NATIVE_TEST
; lib_deps =
