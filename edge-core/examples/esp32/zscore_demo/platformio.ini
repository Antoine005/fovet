; Ardent SDK — Pulse
; Z-Score + Drift Demo — ESP32-CAM (Espressif AI-Thinker) avec MQTT → Watch
;
; Requirements:
;   - PlatformIO Core >= 6.x
;   - Adaptateur CH340 sur COM4 (115200 baud)
;   - Copier src/config.h.example → src/config.h et remplir WiFi/MQTT credentials
;
; IMPORTANT board=esp32dev (PAS esp32cam) :
;   board=esp32cam crashe silencieusement sur l'init PSRAM avant setup()
;   avec l'adaptateur CH340. Voir CLAUDE.md section "Hardware gotchas".
;
; Flash:   pio run --target upload
; Monitor: pio device monitor   (ouvrir AVANT de presser RST)

[env:esp32cam]
platform  = espressif32
board     = esp32dev          ; board=esp32cam interdit — PSRAM crash silencieux
framework = arduino

build_flags =
    -std=c++17
    -DARD_PLATFORM_ESP32
    -DCORE_DEBUG_LEVEL=0

monitor_speed = 115200
upload_speed  = 115200 
upload_port   = COM4
monitor_port  = COM4

lib_extra_dirs =
    ${PROJECT_DIR}/../../../../

lib_deps =
    ardent-pulse
    knolleary/PubSubClient@^2.8

; Optional: uncomment to enable unit-tests on native host
; [env:native]
; platform = native
; build_flags =
;     -std=c99
;     -I../../include
;     -DARD_NATIVE_TEST
; lib_deps =
