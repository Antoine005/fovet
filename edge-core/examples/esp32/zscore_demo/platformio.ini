; Fovet SDK — Sentinelle
; Z-Score Demo — ESP32-CAM (Espressif AI-Thinker)
;
; Requirements:
;   - PlatformIO Core >= 6.x
;   - FTDI USB-UART adapter connected to GPIO1 (TX) / GPIO3 (RX)
;   - 115200 baud monitor
;
; Flash: pio run --target upload
; Monitor: pio device monitor

[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino

build_flags =
    -std=c++17
    -I../../include
    -DFOVET_PLATFORM_ESP32
    -DCORE_DEBUG_LEVEL=0

monitor_speed = 115200
upload_speed  = 921600

; Optional: uncomment to enable unit-tests on native host
; [env:native]
; platform = native
; build_flags =
;     -std=c99
;     -I../../include
;     -DFOVET_NATIVE_TEST
; lib_deps =
