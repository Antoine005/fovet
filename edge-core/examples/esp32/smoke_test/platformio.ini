; Fovet SDK — Sentinelle / Smoke test — batterie de diagnostic série
;
; ORDRE DE TEST RECOMMANDÉ :
;
;   1. smoke_dev   → board=esp32dev (bypass PSRAM/caméra init)
;                    + CORE_DEBUG_LEVEL=5 (messages IDF avant setup())
;                    + exception decoder (décode les stack traces de panic)
;                    COMMANDE : pio run -e smoke_dev --target upload
;                               pio device monitor -e smoke_dev
;                    ATTENDU  : messages IDF au boot, puis "HELLO" 3 s après
;
;   2. smoke_9600  → 9600 baud — si smoke_dev ne montre rien, teste le CH340
;                    COMMANDE : pio run -e smoke_9600 --target upload
;                               pio device monitor -e smoke_9600
;
;   3. smoke       → baseline original 115200 / esp32cam (déjà testé, échoue)
;
; Si smoke_dev montre quelque chose mais smoke ne montre rien :
;   → PSRAM / caméra init crashe sur board=esp32cam, utiliser board=esp32dev
;     pour tous les prochains flashs jusqu'au diagnostic complet.
;
; Si aucun env ne montre rien :
;   → Problème hardware (TX ESP32 GPIO1 non connecté au RXD du CH340,
;     ou mauvais port COM, ou adaptateur défectueux).
;   → Ouvrir un terminal séparé à 74880 baud sur COM4 (baud du bootloader ROM)
;     et appuyer RST — si on voit du texte, le CH340 fonctionne.

; ─── Environnement commun ───────────────────────────────────────────────────

[common]
platform  = espressif32
framework = arduino
; Désactive RTS/DTR sur le moniteur : évite que l'ouverture du moniteur
; resette le board avant que setup() ait fini son delay.
monitor_rts = 0
monitor_dtr = 0
upload_port   = COM4
monitor_port  = COM4
upload_speed  = 460800

; ─── 1. TEST PRIORITAIRE : esp32dev + debug IDF ─────────────────────────────

[env:smoke_dev]
platform  = ${common.platform}
framework = ${common.framework}
board     = esp32dev          ; PAS esp32cam — évite l'init PSRAM/caméra
upload_port   = ${common.upload_port}
monitor_port  = ${common.monitor_port}
upload_speed  = ${common.upload_speed}
monitor_rts   = ${common.monitor_rts}
monitor_dtr   = ${common.monitor_dtr}

build_flags =
    -std=c++17
    -DBAUD_RATE=115200
    -DCORE_DEBUG_LEVEL=5     ; affiche les messages IDF (boot, panic) AVANT setup()

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder   ; décode les stack traces de panic

; ─── 2. TEST BAUD RATE : 9600 ───────────────────────────────────────────────

[env:smoke_9600]
platform  = ${common.platform}
framework = ${common.framework}
board     = esp32cam
upload_port   = ${common.upload_port}
monitor_port  = ${common.monitor_port}
upload_speed  = ${common.upload_speed}
monitor_rts   = ${common.monitor_rts}
monitor_dtr   = ${common.monitor_dtr}

build_flags =
    -std=c++17
    -DBAUD_RATE=9600
    -DCORE_DEBUG_LEVEL=0

monitor_speed = 9600

; ─── 3. BASELINE : esp32cam / 115200 (déjà testé) ───────────────────────────

[env:smoke]
platform  = ${common.platform}
framework = ${common.framework}
board     = esp32cam
upload_port   = ${common.upload_port}
monitor_port  = ${common.monitor_port}
upload_speed  = ${common.upload_speed}
monitor_rts   = ${common.monitor_rts}
monitor_dtr   = ${common.monitor_dtr}

build_flags =
    -std=c++17
    -DBAUD_RATE=115200
    -DCORE_DEBUG_LEVEL=0

monitor_speed = 115200
