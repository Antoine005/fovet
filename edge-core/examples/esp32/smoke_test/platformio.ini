; Fovet SDK — Sentinelle
; Smoke test — minimal first-flash for ESP32-CAM with CH340 adapter (COM4)
;
; Purpose: verify the SDK runs on hardware before enabling WiFi/MQTT.
;   - No WiFi, no MQTT, no credentials needed
;   - Feeds a synthetic 1 Hz sine wave to fovet_zscore_update()
;   - Injects a ±5σ spike every 200 samples (LED blinks on detection)
;   - CSV output on serial: index,value,mean,stddev,zscore,anomaly
;
; Flash:   pio run --target upload
; Monitor: pio device monitor   (115200 baud)

[env:smoke]
platform  = espressif32
board     = esp32cam
framework = arduino

build_flags =
    -std=c++17
    -DFOVET_PLATFORM_ESP32
    -DCORE_DEBUG_LEVEL=0

monitor_speed = 115200
upload_speed  = 460800
upload_port   = COM4
monitor_port  = COM4

lib_extra_dirs =
    ${PROJECT_DIR}/../../../../

lib_deps =
    fovet-sentinelle
