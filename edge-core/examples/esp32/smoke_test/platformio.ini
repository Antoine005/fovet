; Ardent SDK — Pulse
; Smoke test — premier flash hardware avec SDK Z-Score complet
;
; board=esp32dev (PAS esp32cam) — voir CLAUDE.md section "Hardware gotchas"
; board=esp32cam crashe silencieusement sur l'init PSRAM avant setup() avec
; l'adaptateur CH340 : rien n'apparaît dans le moniteur série.
;
; Flash:   pio run -e smoke --target upload
; Monitor: pio device monitor -e smoke   (ouvrir AVANT de presser RST)

[env:smoke]
platform  = espressif32
board     = esp32dev          ; board=esp32cam interdit — PSRAM crash silencieux
framework = arduino

build_flags =
    -std=c++17
    -DARD_PLATFORM_ESP32
    -DCORE_DEBUG_LEVEL=0

monitor_speed = 115200
upload_speed  = 460800
upload_port   = COM4
monitor_port  = COM4
; Désactive RTS/DTR : empêche le moniteur de resetter le board à l'ouverture
monitor_rts   = 0
monitor_dtr   = 0

lib_extra_dirs =
    ${PROJECT_DIR}/../../../../

lib_deps =
    ardent-pulse
    knolleary/PubSubClient @ ^2.8
