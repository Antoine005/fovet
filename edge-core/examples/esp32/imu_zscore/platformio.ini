; Fovet SDK — Sentinelle
; IMU Z-Score Demo — MPU-6050 → ESP32-CAM → MQTT → Vigie
;
; Requirements:
;   - PlatformIO Core >= 6.x
;   - Adaptateur CH340 sur COM4 (115200 baud)
;   - MPU-6050 câblé sur SDA=GPIO13, SCL=GPIO14
;   - Copier src/config.h.example → src/config.h et remplir WiFi/MQTT credentials
;
; Câblage MPU-6050 / ESP32-CAM :
;   VCC → 3.3V   GND → GND   SDA → GPIO13   SCL → GPIO14   AD0 → GND
;
; IMPORTANT board=esp32dev (PAS esp32cam) :
;   board=esp32cam crashe silencieusement sur l'init PSRAM avant setup()
;   avec l'adaptateur CH340. Voir CLAUDE.md section "Hardware gotchas".
;
; Flash:   pio run --target upload
; Monitor: pio device monitor   (ouvrir AVANT de presser RST)

[env:esp32cam]
platform  = espressif32
board     = esp32dev          ; board=esp32cam interdit — PSRAM crash silencieux
framework = arduino

build_flags =
    -std=c++17
    -DFOVET_PLATFORM_ESP32
    -DCORE_DEBUG_LEVEL=0

monitor_speed = 115200
upload_speed  = 115200
upload_port   = COM4
monitor_port  = COM4

lib_extra_dirs =
    ${PROJECT_DIR}/../../../../

lib_deps =
    fovet-sentinelle
    knolleary/PubSubClient@^2.8
