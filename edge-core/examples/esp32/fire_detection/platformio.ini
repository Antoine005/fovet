; Fovet SDK — Sentinelle
; fire_detection — Détection visuelle feu/fumée via OV2640 + Z-Score
;
; board=esp32dev (jamais esp32cam — crash PSRAM, voir CLAUDE.md)
; PSRAM initialisé manuellement dans setup() via psramInit() si détecté.
; Frame buffer RGB565 QQVGA alloué en DRAM (CAMERA_FB_IN_DRAM) → pas de PSRAM requis.
;
; Lib caméra : https://github.com/espressif/esp32-camera (esp32-camera v2.x)
;
; Flash:   pio run -e fire_detection --target upload
; Monitor: pio device monitor -e fire_detection   (ouvrir AVANT RST)

[env:fire_detection]
platform  = espressif32
board     = esp32dev
framework = arduino

build_flags =
    -std=c++17
    -DFOVET_PLATFORM_ESP32
    -DCORE_DEBUG_LEVEL=0

monitor_speed = 115200
upload_speed  = 460800
upload_port   = COM4
monitor_port  = COM4
monitor_rts   = 0
monitor_dtr   = 0

lib_extra_dirs =
    ${PROJECT_DIR}/../../../../

lib_deps =
    fovet-sentinelle
    https://github.com/espressif/esp32-camera
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3
