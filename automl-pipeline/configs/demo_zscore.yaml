# Ardent Forge — Demo config: Z-Score on synthetic sine signal
# Run: uv run forge run --config configs/demo_zscore.yaml

name: demo-zscore-sine
description: "Détection d'anomalies Z-Score sur signal sinusoïdal synthétique"

data:
  source: synthetic
  signal: sine           # sine | random_walk | constant
  n_samples: 1000        # nombre de points générés
  frequency: 1.0         # fréquence du sinus (Hz normalisé)
  noise_std: 0.1         # écart-type du bruit gaussien ajouté
  anomaly_rate: 0.05     # fraction de points contenant une anomalie (0–0.5)
  anomaly_magnitude: 5.0 # amplitude de l'anomalie en multiples de noise_std
  columns: [value]
  seed: 42

detectors:
  - type: zscore
    threshold_sigma: 3.0  # seuil en sigmas (3.0 = ~0.3% faux positifs sur gaussienne)
    min_samples: 30       # nombre minimum de samples avant que le seuil soit actif

# Train/test split : entraîner sur données propres, évaluer sur données avec anomalies
# Désactiver (enabled: false) pour entraîner et évaluer sur les mêmes données
split:
  enabled: true
  test_ratio: 0.2      # 80% entraînement, 20% évaluation
  random_state: 42

export:
  targets: [c_header, json_config]
  output_dir: models/demo_zscore
  quantization: float32  # non utilisé pour Z-Score (export C header uniquement)

# Métadonnées pour ard_model_manifest.h — copier dans src/ du projet PlatformIO
manifest:
  sensor: synthetic          # "synthetic" | "imu" | "camera" | "temperature" | "hr"
  unit: z_score              # unité affichée sur l'axe Y de Watch
  value_min: -6.0            # borne basse pour l'auto-scale du graphe Watch
  value_max: 6.0             # borne haute
  label_normal: normal
  label_anomaly: anomaly

report:
  enabled: true
  format: html
  output_dir: reports
