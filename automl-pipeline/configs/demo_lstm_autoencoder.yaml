# Fovet Forge — Demo config: LSTM Autoencoder on synthetic sine signal
# Trains a sequence-aware reconstruction model and exports TFLite for ESP32.
#
# Usage:
#   uv run forge run --config configs/demo_lstm_autoencoder.yaml
#
# Install ML extras first:
#   uv sync --extra ml

name: demo-lstm-autoencoder
description: "LSTM autoencoder sur signal sinusoïdal synthétique — export TFLite Micro"

data:
  source: synthetic
  signal: sine
  n_samples: 2000           # plus de données pour l'entraînement LSTM
  frequency: 1.0
  noise_std: 0.1
  anomaly_rate: 0.05
  anomaly_magnitude: 5.0
  columns: [value]
  seed: 42

detectors:
  - type: lstm_autoencoder
    sequence_length: 30       # fenêtre temporelle en échantillons
    latent_dim: 16            # dimension de la représentation compressée
    epochs: 50
    batch_size: 32
    threshold_percentile: 95.0 # flag le top 5% des MSE d'entraînement

# Train/test split
split:
  enabled: true
  test_ratio: 0.2
  random_state: 42

export:
  targets: [tflite_micro, json_config]
  output_dir: models/demo_lstm_autoencoder
  quantization: float32      # utiliser int8 pour déploiement ESP32 production

# Métadonnées pour fovet_model_manifest.h — copier dans src/ du projet PlatformIO
manifest:
  sensor: synthetic
  unit: recon_error          # MSE de reconstruction (LSTM AE)
  value_min: 0.0
  value_max: 1.0
  label_normal: normal
  label_anomaly: anomaly

report:
  enabled: true
  format: html
  output_dir: reports
