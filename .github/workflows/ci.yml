name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # edge-core — build & test (gcc natif, MSYS2 not available on Linux runners)
  # Uses Ubuntu gcc to compile and run unit tests
  # -------------------------------------------------------------------------
  edge-core:
    name: edge-core tests (gcc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-core

    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        run: make -C tests

  # -------------------------------------------------------------------------
  # platform-dashboard — TypeScript check + Vitest
  # -------------------------------------------------------------------------
  dashboard:
    name: dashboard tests (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: platform-dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-secret-32-chars-long-enough-ok' }}
          DASHBOARD_PASSWORD: ci-password
          ALLOWED_ORIGIN: http://localhost:3000

  # -------------------------------------------------------------------------
  # landing — deploy to GitHub Pages (push to master only)
  # Custom domain: fovet.eu (CNAME record must point to antoine005.github.io)
  # -------------------------------------------------------------------------
  deploy-landing:
    name: Deploy landing (GitHub Pages)
    runs-on: ubuntu-latest
    needs: [edge-core, dashboard]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/

      - id: deployment
        uses: actions/deploy-pages@v4
